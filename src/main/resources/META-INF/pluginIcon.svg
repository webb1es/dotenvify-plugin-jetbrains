<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 40 40">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#667EEA"/>
      <stop offset="100%" stop-color="#764BA2"/>
    </linearGradient>
    <linearGradient id="arrow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F6D365"/>
      <stop offset="100%" stop-color="#FDA085"/>
    </linearGradient>
  </defs>

  <!-- Background: rounded square with gradient -->
  <rect width="40" height="40" rx="8" fill="url(#bg)"/>

  <!-- Green dot (the "dot" in dotenv) -->
  <circle cx="10" cy="12" r="3.5" fill="#7AE582"/>

  <!-- Arrow: transform/convert symbol with warm gradient -->
  <path d="M16 12 L27 12" stroke="url(#arrow)" stroke-width="2" stroke-linecap="round"/>
  <path d="M24 8 L28 12 L24 16" fill="none" stroke="url(#arrow)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- .env file card -->
  <rect x="5" y="21" width="30" height="15" rx="3" fill="rgba(255,255,255,0.18)"/>

  <!-- Key=Value lines -->
  <text x="8" y="29.5" font-family="monospace" font-size="7" font-weight="bold" fill="#7AE582">API</text>
  <text x="20" y="29.5" font-family="monospace" font-size="7" fill="#FDA085">=</text>
  <text x="25" y="29.5" font-family="monospace" font-size="7" fill="#F6D365">key</text>
  <text x="8" y="34" font-family="monospace" font-size="3.5" fill="rgba(255,255,255,0.5)">DB_URL=postgres://</text>
</svg>
